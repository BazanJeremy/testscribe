services:
  testscribe:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # Optional — agents use rule-based fallback if not set
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FLASK_ENV: production
      FLASK_PORT: 5000
      # Set to "true" to use sentence-transformers neural embeddings
      USE_NEURAL_EMBEDDINGS: "false"
    volumes:
      # Persist ChromaDB vector store between restarts
      - chroma_data:/app/data/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chroma_data:
